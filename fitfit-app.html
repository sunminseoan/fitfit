<style>
:root {
  --clay-canvas: #faf9f7; --clay-white: #ffffff; --clay-black: #000000;
  --clay-text-primary: #000000; --clay-text-secondary: #9f9b93; --clay-text-tertiary: #55534e;
  --clay-border-oat: #dad4c8; --clay-border-oat-light: #eee9df;
  --clay-matcha-300: #84e7a5; --clay-matcha-600: #078a52; --clay-matcha-800: #02492a;
  --clay-slushie-500: #3bd3fd; --clay-slushie-800: #0089ad;
  --clay-lemon-400: #f8cc65; --clay-ube-300: #c1b0ff; --clay-ube-800: #43089f;
  --clay-pomegranate-400: #fc7981; --clay-dragonfruit: #e8427c;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: #fffbe8;
  font-family: 'Pretendard', Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  display: flex; align-items: center; justify-content: center;
}
#root { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }

/* 모바일: 풀스크린 */
@media (max-width: 480px) {
  body { background: #fffbe8; align-items: flex-start; }
  #root { align-items: flex-start; }
}

/* 서비스워커 등록 */
.status-cover { position: absolute; top: 0; left: 0; right: 0; height: 58px; background: #fffbe8; z-index: 25; pointer-events: none; }
.screen-scroll { height: 100%; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.screen-scroll::-webkit-scrollbar { display: none; }
.bottom-nav {
  position: absolute; bottom: 0; left: 0; right: 0; height: 82px;
  background: rgba(255,255,255,0.92); backdrop-filter: blur(12px);
  border-top: 1px solid rgba(218,212,200,0.6);
  display: flex; align-items: flex-start; justify-content: space-around;
  padding-top: 10px; z-index: 30;
}
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 0 8px; transition: opacity 0.15s; }
.nav-item:hover { opacity: 0.7; }
.nav-label { font-size: 10px; font-weight: 600; letter-spacing: 0.3px; font-feature-settings: 'ss03'; }
.clay-input {
  width: 100%; padding: 10px 14px; border: 1px solid #dad4c8; border-radius: 12px;
  background: #fff; font-family: 'Pretendard', Arial, sans-serif;
  font-size: 14px; color: #000; outline: none;
  transition: border-color 0.15s, box-shadow 0.15s; box-shadow: rgba(0,0,0,0.04) 0px 1px 2px;
}
.clay-input:focus { border-color: #000; box-shadow: 0 0 0 3px rgba(0,0,0,0.06); }
.clay-input::placeholder { color: #b5b0a8; }
.btn-primary {
  width: 100%; padding: 13px; border-radius: 100px; background: #000; color: #fff; border: none;
  font-family: 'Pretendard', Arial, sans-serif; font-size: 15px; font-weight: 600; cursor: pointer;
  letter-spacing: -0.3px; transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-primary:hover { background: #84e7a5; color: #000; transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
.btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
.btn-matcha { padding: 11px 16px; border-radius: 100px; background: #84e7a5; color: #02492a; border: none; font-family: 'Pretendard', Arial, sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: transform 0.15s, background 0.15s; white-space: nowrap; }
.btn-matcha:hover { background: #078a52; color: #fff; transform: translateY(-1px); }
.btn-ghost { padding: 8px 14px; border-radius: 100px; background: transparent; color: #55534e; border: 1px solid #dad4c8; font-family: 'Pretendard', Arial, sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; transition: border-color 0.15s, background 0.15s; white-space: nowrap; }
.btn-ghost:hover { border-color: #000; background: #faf9f7; }
.btn-salmon { padding: 10px 16px; border-radius: 100px; background: #fc7981; color: #fff; border: none; font-family: 'Pretendard', Arial, sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: transform 0.15s, background 0.15s; }
.btn-salmon:hover { background: #e8427c; transform: translateY(-1px); }
.gender-toggle { display: flex; gap: 8px; }
.gender-btn { flex: 1; padding: 9px; border-radius: 11px; border: 1px solid #dad4c8; background: #fff; font-family: 'Pretendard', Arial, sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; color: #55534e; display: flex; align-items: center; justify-content: center; gap: 5px; }
.gender-btn.active-boy { background: #f0f8ff; border-color: #3bd3fd; color: #0089ad; font-weight: 600; }
.gender-btn.active-girl { background: #fff0f5; border-color: #fc7981; color: #c0434a; font-weight: 600; }
.profile-card { background: #fff; border: 1px solid #dad4c8; border-radius: 18px; padding: 14px 16px; box-shadow: rgba(0,0,0,0.06) 0 2px 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: box-shadow 0.15s, border-color 0.15s, transform 0.15s; position: relative; }
.profile-card:hover { box-shadow: rgba(0,0,0,0.12) 0 4px 16px; transform: translateY(-1px); }
.profile-card.selected { border-color: #000 !important; border-width: 2px !important; box-shadow: rgba(0,0,0,0.10) 0 3px 12px; }
.section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: #9f9b93; margin-bottom: 8px; font-feature-settings: 'ss03'; }
.result-card { background: #000; border-radius: 22px; padding: 20px; color: #fff; }
.result-size-badge { background: #84e7a5; color: #02492a; border-radius: 14px; padding: 6px 20px; font-size: 40px; font-weight: 700; letter-spacing: -2px; display: inline-block; margin-bottom: 4px; font-feature-settings: 'ss01'; }
.history-item { background: #fff; border: 1px solid #dad4c8; border-radius: 16px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; transition: box-shadow 0.15s; }
.history-item:hover { box-shadow: rgba(0,0,0,0.08) 0 3px 12px; }
.history-brand-badge { width: 56px; height: 56px; border-radius: 14px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.tryon-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.tryon-card { background: #faf9f7; border-radius: 24px; padding: 20px; max-width: 320px; width: 88%; box-shadow: 0 40px 80px rgba(0,0,0,0.4); display: flex; flex-direction: column; align-items: center; gap: 14px; }
.chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 100px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
.chip-matcha { background: #e8fdf0; color: #02492a; }
.chip-lemon { background: #fffbe8; color: #9d6a09; }
.chip-ube { background: #f4f0ff; color: #43089f; }
.chip-slushie { background: #e8f9ff; color: #0089ad; }
.chip-pomeg { background: #fff0f1; color: #c0434a; }
.upload-box { border: 2px dashed #dad4c8; border-radius: 14px; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; transition: border-color 0.15s, background 0.15s; background: #faf9f7; }
.upload-box:hover { border-color: #000; background: #fff; }
@keyframes floatA { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-10px)} }
@keyframes floatB { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(8px)} }
@keyframes floatC { 0%,100%{transform:translateY(0px)} 50%{transform:translateY(-6px)} }
@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

function BabyAvatar({ profile, size=48 }) {
  const char = CHAR_ICONS[profile.emoji] || null;
  if (char) return <div style={{ width:size, height:size, borderRadius:'50%', background:char.bg, display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0, overflow:'hidden', padding:size*0.1 }}>{char.svg}</div>;
  return <div style={{ width:size, height:size, borderRadius:'50%', background:profile.gender==='girl'?'#fff0f5':'#e8f9ff', display:'flex', alignItems:'center', justifyContent:'center', fontSize:size*0.46, flexShrink:0 }}>{profile.emoji}</div>;
}

  return (
    <div style={{ position:'relative', padding:'72px 16px 12px', overflow:'hidden' }}>
      <div style={{ position:'absolute', top:64,  right:28, width:7,  height:7,  borderRadius:'50%', background:'#3bd3fd', animation:'floatB 2.8s ease-in-out infinite', opacity:0.8 }}/>
      <div style={{ position:'absolute', top:100, right:18, width:18, height:18, borderRadius:'50%', background:orbColor2, animation:'floatC 3.6s ease-in-out infinite', opacity:0.75 }}/>
      <div style={{ position:'absolute', top:80,  right:60, width:5,  height:5,  borderRadius:'50%', background:'#fc7981', animation:'floatA 2.5s ease-in-out infinite', opacity:0.8 }}/>
      <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:2, position:'relative', zIndex:1 }}>
        <span style={{ fontSize:26, fontWeight:900, letterSpacing:-0.5, color:'#fc7981', fontFamily:"'Nunito','Pretendard',sans-serif" }}>fitfit</span>

      <div style={{ fontSize:12, color:'#9f9b93', position:'relative', zIndex:1 }}>{subtitle}</div>

}

function ProfileScreen({ profiles, setProfiles, selectedProfile, setSelectedProfile, onRecommend }) {
  const [showForm, setShowForm] = React.useState(false);
  const [editTarget, setEditTarget] = React.useState(null);
  const [form, setForm] = React.useState({ name:'', gender:'boy', age:'', height:'', weight:'', emoji:'cloud-blue' });
  const openAdd  = () => { setForm({ name:'', gender:'boy', age:'', height:'', weight:'', emoji:'cloud-blue' }); setEditTarget(null); setShowForm(true); };
  const openEdit = (p) => { setForm({ name:p.name, gender:p.gender, age:p.age, height:p.height, weight:p.weight, emoji:p.emoji }); setEditTarget(p.id); setShowForm(true); };
  const saveProfile = () => {
    if (!form.name || !form.age || !form.height || !form.weight) return;
    if (editTarget) { setProfiles(prev => prev.map(p => p.id===editTarget ? { ...p, ...form, age:+form.age, height:+form.height, weight:+form.weight } : p)); }
    else { const newP = { id:Date.now(), ...form, age:+form.age, height:+form.height, weight:+form.weight, color:form.gender==='girl'?'#fff0f5':'#e8f9ff' }; setProfiles(prev => [...prev, newP]); }
    setShowForm(false);
  };
  const deleteProfile = (id) => { setProfiles(prev => prev.filter(p => p.id!==id)); if (selectedProfile?.id===id) setSelectedProfile(null); };
  return (
    <div className="screen-scroll" style={{ background:'#fffbe8', paddingBottom:90 }}>
      <div className="status-cover"/>
      <ScreenHeader title="아기 프로필" subtitle="사이즈 추천을 위한 우리 아기 정보를 등록해보세요" orbColor2="#fc7981"/>
      <div style={{ padding:'0 16px' }}>
        <div className="section-label">저장된 프로필 {profiles.length}</div>
        <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
          {profiles.map(p => (
            <div key={p.id} className={`profile-card${selectedProfile?.id===p.id?' selected':''}`} onClick={() => setSelectedProfile(p)} style={{ borderColor:'rgba(187,170,187,0.667)' }}>
              <BabyAvatar profile={p} size={52}/>
              <div style={{ flex:1 }}>
                <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:3 }}>
                  <span style={{ fontSize:15, fontWeight:700, letterSpacing:-0.4 }}>{p.name}</span>
                  <span className={`chip ${p.gender==='girl'?'chip-pomeg':'chip-slushie'}`}>{p.gender==='girl'?'여아':'남아'}</span>
                </div>
                <div style={{ display:'flex', gap:6 }}>
                  <span style={{ fontSize:12, color:'#55534e' }}>{p.age}개월</span><span style={{ fontSize:12, color:'#b5b0a8' }}>·</span>
                  <span style={{ fontSize:12, color:'#55534e' }}>{p.height}cm</span><span style={{ fontSize:12, color:'#b5b0a8' }}>·</span>
                  <span style={{ fontSize:12, color:'#55534e' }}>{p.weight}kg</span>
                </div>
              </div>
              <button onClick={e => { e.stopPropagation(); openEdit(p); }} style={{ background:'none', border:'none', cursor:'pointer', color:'#b5b0a8', padding:6, borderRadius:8, display:'flex', alignItems:'center', transition:'color 0.15s' }} onMouseOver={e => e.currentTarget.style.color='#000'} onMouseOut={e => e.currentTarget.style.color='#b5b0a8'}>{Icon.edit}</button>
            </div>
          ))}
        </div>
        <button onClick={openAdd} style={{ marginTop:10, width:'100%', padding:'12px', borderRadius:14, border:'2px dashed #dad4c8', cursor:'pointer', display:'flex', alignItems:'center', gap:6, justifyContent:'center', fontSize:13, fontWeight:600, color:'#9f9b93', background:'#fffbe8', fontFamily:'Pretendard', transition:'border-color 0.15s, color 0.15s', opacity:0.84 }} onMouseOver={e => { e.currentTarget.style.borderColor='#000'; e.currentTarget.style.color='#000'; }} onMouseOut={e => { e.currentTarget.style.borderColor='#dad4c8'; e.currentTarget.style.color='#9f9b93'; }}>
          {Icon.plus} 새 프로필 추가
        </button>
      </div>
      {selectedProfile && (
        <div style={{ padding:'16px 16px 0' }}>
          <button className="btn-primary" onClick={onRecommend} style={{ height:50 }}>이 프로필로 사이즈 추천받기 →</button>
        </div>
      )}
      <div style={{ position:'absolute', bottom:100, left:20, width:18, height:18, borderRadius:'50%', background:'#f8cc65', animation:'floatA 3.2s ease-in-out infinite', opacity:0.9, zIndex:5, pointerEvents:'none' }}/>
      <div style={{ position:'absolute', bottom:128, left:46, width:12, height:12, borderRadius:'50%', background:'#84e7a5', animation:'floatB 4s ease-in-out infinite', opacity:0.8, zIndex:5, pointerEvents:'none' }}/>
      {showForm && (
        <div style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.5)', zIndex:200, display:'flex', alignItems:'flex-end', backdropFilter:'blur(4px)' }}>
          <div style={{ background:'#faf9f7', borderRadius:'24px 24px 0 0', padding:'20px 20px 36px', width:'100%', maxHeight:'85vh', overflowY:'auto' }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:20 }}>
              <div style={{ fontSize:17, fontWeight:700, letterSpacing:-0.5 }}>{editTarget?'프로필 수정':'새 프로필'}</div>
              <button onClick={() => setShowForm(false)} style={{ background:'#f0ede8', border:'none', borderRadius:'50%', width:32, height:32, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', color:'#55534e' }}>{Icon.close}</button>
            </div>
            <div style={{ marginBottom:14 }}>
              <div className="section-label" style={{ letterSpacing:0 }}>아기 캐릭터</div>
              <div style={{ display:'flex', gap:8, flexWrap:'wrap' }}>
                {CHAR_KEYS.filter(k => k!=='star-yellow').map(k => (
                  <button key={k} onClick={() => setForm(f => ({ ...f, emoji:k }))} style={{ width:48, height:48, borderRadius:'50%', padding:5, border:`2px solid ${form.emoji===k?'#000':'transparent'}`, background:CHAR_ICONS[k].bg, cursor:'pointer', transition:'border-color 0.15s', overflow:'hidden', display:'flex', alignItems:'center', justifyContent:'center' }}>
                    <div style={{ width:34, height:34 }}>{CHAR_ICONS[k].svg}</div>
                  </button>
                ))}
                <button style={{ width:48, height:48, borderRadius:'50%', border:'2px dashed #dad4c8', background:'#faf9f7', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', color:'#9f9b93' }}>{Icon.camera}</button>
              </div>
            </div>
            <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
              <div><div className="section-label" style={{ letterSpacing:0 }}>닉네임</div><input className="clay-input" placeholder="예: 하늘이" value={form.name} onChange={e => setForm(f => ({ ...f, name:e.target.value }))} style={{ height:44 }}/></div>
              <div><div className="section-label" style={{ letterSpacing:0 }}>성별</div><div className="gender-toggle"><button className={`gender-btn${form.gender==='boy'?' active-boy':''}`} onClick={() => setForm(f => ({ ...f, gender:'boy' }))} style={{ borderRadius:100, height:44 }}>남아</button><button className={`gender-btn${form.gender==='girl'?' active-girl':''}`} onClick={() => setForm(f => ({ ...f, gender:'girl' }))} style={{ borderRadius:100, height:44 }}>여아</button></div></div>
              <div><div className="section-label" style={{ letterSpacing:0 }}>월령(개월)</div><input className="clay-input" type="number" placeholder="예: 8" value={form.age} onChange={e => setForm(f => ({ ...f, age:e.target.value }))} style={{ height:44 }}/></div>
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>
                <div><div className="section-label" style={{ letterSpacing:0 }}>키(CM)</div><input className="clay-input" type="number" placeholder="예: 68" value={form.height} onChange={e => setForm(f => ({ ...f, height:e.target.value }))} style={{ height:44 }}/></div>
                <div><div className="section-label" style={{ letterSpacing:0 }}>몸무게(KG)</div><input className="clay-input" type="number" placeholder="예: 7.8" value={form.weight} onChange={e => setForm(f => ({ ...f, weight:e.target.value }))} style={{ height:44 }}/></div>
              </div>
            </div>
            <div style={{ marginTop:20, display:'flex', flexDirection:editTarget?'row':'column', gap:8 }}>
              {editTarget && <button onClick={() => { deleteProfile(editTarget); setShowForm(false); }} style={{ flex:1, padding:'14px', borderRadius:999, fontFamily:'inherit', fontSize:14, fontWeight:600, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:6, border:'1.5px solid #e5e2dc', background:'#f1efe4', color:'#515151', height:50 }}>{Icon.trash} 프로필 삭제</button>}
              <button className="btn-primary" onClick={saveProfile} style={{ height:50, flex:1 }}>저장하기</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function RecommendScreen({ selectedProfile, histories, setHistories }) {
  const [url, setUrl] = React.useState('');
  const [brand, setBrand] = React.useState('');
  const [product, setProduct] = React.useState('');
  const [imageData, setImageData] = React.useState(null);
  const [imagePreview, setImagePreview] = React.useState(null);
  const fileInputRef = React.useRef(null);
  const handleImageChange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => { setImageData(ev.target.result); setImagePreview(ev.target.result); };
    reader.readAsDataURL(file);
  };
  const [showResult, setShowResult] = React.useState(false);
  const [loading, setLoading] = React.useState(false);
  const [showTryOn, setShowTryOn] = React.useState(false);
  const [showBrandInput, setShowBrandInput] = React.useState(false);
  const [result, setResult] = React.useState(null);
  const [error, setError] = React.useState(null);
  const profile = selectedProfile || SAMPLE_PROFILES[0];
  const handleRecommend = async () => {
    setLoading(true); setError(null);
    try { const data = await callClaude(profile, brand, product, imageData); setResult(data); setShowResult(true); }
    catch (err) { setError(err.message || 'AI 추천 중 오류가 발생했어요. 잠시 후 다시 시도해주세요.'); }
    finally { setLoading(false); }
  };
  const saveToHistory = () => {
    const finalBrand   = result?.crawledBrand   || brand   || '브랜드 미상';
    const finalProduct = result?.crawledProduct || product || '상품명 미상';
    const newEntry = {
      id: Date.now(),
      brand:      finalBrand,
      product:    finalProduct,
      size:       result?.recommendedSize || '80',
      date:       new Date().toISOString().slice(0, 10),
      profile:    profile.name,
      url:        url || '#',
      color:      '#e8fdf0',
      brandShort: finalBrand.slice(0, 2),
      image:      result?.crawledImage || null,
    };
    setHistories(prev => [newEntry, ...prev]);
  };
  const resetForm = () => { setShowResult(false); setUrl(''); setBrand(''); setProduct(''); setImageData(null); setImagePreview(null); setResult(null); setError(null); };
  return (
    <div className="screen-scroll" style={{ background:'#fffbe8', paddingBottom:90 }}>
      <div className="status-cover"/>
      <ScreenHeader title="사이즈 추천" subtitle="AI가 딱 맞는 사이즈를 골라드려요"/>
      <div style={{ margin:'4px 16px 0' }}><div className="section-label" style={{ letterSpacing:'0.4px' }}>선택된 아기 프로필</div></div>
      <div style={{ margin:'0 16px', background:'#000', borderRadius:18, padding:'14px 16px', display:'flex', alignItems:'center', gap:12 }}>
        <BabyAvatar profile={profile} size={44}/>
        <div style={{ flex:1, fontSize:16, fontWeight:700, color:'#fff', letterSpacing:-0.5 }}>{profile.name}</div>
        {[['개월',profile.age],['cm',profile.height],['kg',profile.weight]].map(([unit,val],i) => (
          <React.Fragment key={unit}>
            {i>0 && <div style={{ width:1, background:'#333' }}/>}
            <div style={{ textAlign:'center' }}><div style={{ fontSize:16, fontWeight:700, color:'#84e7a5', lineHeight:1.1 }}>{val}</div><div style={{ fontSize:10, color:'#9f9b93', marginTop:1 }}>{unit}</div></div>
          </React.Fragment>
        ))}
      </div>
      <div style={{ position:'absolute', bottom:100, left:20, width:18, height:18, borderRadius:'50%', background:'#f8cc65', animation:'floatA 3.2s ease-in-out infinite', opacity:0.9, zIndex:5, pointerEvents:'none' }}/>
      <div style={{ position:'absolute', bottom:128, left:46, width:12, height:12, borderRadius:'50%', background:'#84e7a5', animation:'floatB 4s ease-in-out infinite', opacity:0.8, zIndex:5, pointerEvents:'none' }}/>
      {!showResult ? (
        <div style={{ padding:'16px 16px 0', display:'flex', flexDirection:'column', gap:14 }}>
          <div>
            <div className="section-label" style={{ letterSpacing:'0.4px' }}>상품 URL</div>
            <div style={{ position:'relative' }}>
              <div style={{ position:'absolute', left:12, top:'50%', transform:'translateY(-50%)', color:'#9f9b93' }}>{Icon.link}</div>
              <input className="clay-input" style={{ paddingLeft:38, height:44, borderColor:'rgb(186,186,186)' }} placeholder="상품 페이지 URL 붙여넣기" value={url} onChange={e => setUrl(e.target.value)}/>
            </div>
          </div>
          <div>
            <div className="section-label" style={{ letterSpacing:'0.4px' }}>사이즈표 이미지 첨부</div>
            <input ref={fileInputRef} type="file" accept="image/*" style={{ display:'none' }} onChange={handleImageChange}/>
            <div className="upload-box" onClick={() => fileInputRef.current.click()} style={{ backgroundColor:'#fffbe8' }}>
              {imagePreview ? (
                <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:6, width:'100%' }}>
                  <img src={imagePreview} alt="사이즈표" style={{ width:'100%', maxHeight:120, objectFit:'contain', borderRadius:8 }}/>
                  <div style={{ fontSize:11, color:'#9f9b93' }}>탭하여 변경</div>
                </div>
              ) : (
                <><div style={{ color:'#9f9b93' }}>{Icon.image}</div><div style={{ fontSize:13, fontWeight:600, color:'#55534e' }}>이미지 첨부</div><div style={{ fontSize:11, color:'#9f9b93' }}>브랜드 사이즈표 사진을 올려주세요</div></>
              )}
            </div>
          </div>
          <div>
            <button onClick={() => setShowBrandInput(!showBrandInput)} style={{ background:'none', border:'none', cursor:'pointer', fontSize:13, color:'#9f9b93', fontFamily:'inherit', display:'flex', alignItems:'center', gap:6, padding:0 }}>
              브랜드·상품명 직접 입력
              <span style={{ display:'inline-flex', alignItems:'center', width:18, height:18, borderRadius:'50%', border:'1.5px solid #9f9b93', justifyContent:'center', transform:showBrandInput?'rotate(180deg)':'rotate(0deg)', transition:'transform 0.2s' }}>{Icon.chevron}</span>
            </button>
            {showBrandInput && <div style={{ marginTop:10, display:'flex', flexDirection:'column', gap:8 }}><input className="clay-input" placeholder="브랜드명 (예: 무민마마)" value={brand} onChange={e => setBrand(e.target.value)}/><input className="clay-input" placeholder="상품명 (예: 베어 프린트 오버롤)" value={product} onChange={e => setProduct(e.target.value)}/></div>}
          </div>
          {error && <div style={{ background:'#fff0f1', border:'1.5px solid #fc7981', borderRadius:12, padding:'12px 14px', fontSize:13, color:'#c0434a', lineHeight:1.5 }}>⚠️ {error}</div>}
          <button className="btn-primary" onClick={handleRecommend} disabled={loading} style={{ height:50 }}>
            {loading ? <span style={{ display:'flex', alignItems:'center', gap:8 }}><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" style={{ animation:'spin 1s linear infinite' }}><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>Claude AI 분석 중...</span> : <><span style={{ fontSize:16 }}>✨</span> AI 추천받기</>}
          </button>
        </div>
      ) : (
        <div style={{ padding:'14px 16px 0', display:'flex', flexDirection:'column', gap:12 }}>
          {(result?.crawledBrand || result?.crawledProduct || brand || product) && (
            <div style={{ background:'#fff', border:'1.5px solid #dad4c8', borderRadius:14, padding:'12px 14px', display:'flex', alignItems:'center', gap:12 }}>
              {result?.crawledImage && (
                <img src={result.crawledImage} alt="상품이미지" style={{ width:52, height:52, borderRadius:10, objectFit:'cover', flexShrink:0 }} onError={e => { e.target.style.display='none'; }}/>

              <div style={{ flex:1 }}>
                <div style={{ fontSize:11, color:'#9f9b93', fontWeight:600, textTransform:'uppercase', letterSpacing:0.8 }}>{result?.crawledBrand || brand || ''}</div>
                <div style={{ fontSize:14, fontWeight:600, color:'#000', marginTop:2 }}>{result?.crawledProduct || product || ''}</div>
                {url && <div style={{ fontSize:11, color:'#3bd3fd', marginTop:3 }}>🔗 URL에서 자동 추출</div>}
              </div>
            </div>
          )}
          <div className="result-card">
            <div style={{ fontSize:12, color:'#84e7a5', fontWeight:600, textTransform:'uppercase', marginBottom:10, letterSpacing:'0.2px' }}>AI 추천 사이즈</div>
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:12, marginBottom:14 }}>
              <div className="result-size-badge" style={{ borderRadius:'50%', width:100, height:100, display:'flex', alignItems:'center', justifyContent:'center', padding:8, textAlign:'center', lineHeight:1.2, fontSize: result.recommendedSize.length <= 2 ? 44 : result.recommendedSize.length <= 4 ? 32 : result.recommendedSize.length <= 7 ? 22 : 16 }}>{result.recommendedSize}</div>
              <div style={{ fontSize:11, color:'#9f9b93', marginTop:-6 }}>KR 사이즈 기준</div>
              <div style={{ display:'flex', flexWrap:'wrap', gap:6, justifyContent:'center' }}>
                <span style={{ color:'#84e7a5', padding:'3px 8px', borderRadius:8, fontSize:11, fontWeight:600, background:'rgba(255,255,255,0.13)' }}>{result.fitType}</span>
                <span style={{ color:'#f8cc65', padding:'3px 8px', borderRadius:8, fontSize:11, fontWeight:600, background:'rgba(255,255,255,0.15)' }}>{result.wearingPeriod}</span>
              </div>

            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8 }}>

              ))}
            </div>
            <div style={{ marginTop:12, background:'#111', borderRadius:12, padding:'12px 14px' }}><div style={{ fontSize:10, color:'#666', fontWeight:600, textTransform:'uppercase', letterSpacing:0.8, marginBottom:6 }}>AI 코멘트</div><div style={{ fontSize:13, color:'#fff', lineHeight:1.6 }}>{result.comment}</div></div>
          </div>
          <button onClick={() => setShowTryOn(true)} style={{ width:'100%', padding:'13px', background:'linear-gradient(135deg,#c1b0ff,#84e7a5)', color:'#000', border:'none', fontFamily:'inherit', fontSize:15, fontWeight:700, cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', gap:8, letterSpacing:-0.3, transition:'transform 0.15s,box-shadow 0.15s', height:50, borderRadius:100 }} onMouseOver={e => { e.currentTarget.style.transform='translateY(-2px)'; e.currentTarget.style.boxShadow='0 8px 24px rgba(193,176,255,0.4)'; }} onMouseOut={e => { e.currentTarget.style.transform=''; e.currentTarget.style.boxShadow=''; }}><span style={{ fontSize:18 }}>👗</span> AI 입어보기</button>
          <div style={{ display:'flex', gap:8 }}><button className="btn-matcha" style={{ flex:1, height:44 }} onClick={saveToHistory}>히스토리 저장</button><button className="btn-ghost" style={{ flex:1 }} onClick={resetForm}>다시 추천받기</button></div>
        </div>
      )}
      {showTryOn && <TryOnOverlay profile={profile} onClose={() => setShowTryOn(false)} brand={brand||'무민마마'} product={product||'베어 프린트 오버롤'} size={result?.recommendedSize||'80'}/>}
    </div>
  );
}

function TryOnOverlay({ profile, onClose, brand, product, size='80' }) {
  const [loading, setLoading] = React.useState(true);
  React.useEffect(() => { const t = setTimeout(() => setLoading(false), 2000); return () => clearTimeout(t); }, []);
  return (
    <div className="tryon-overlay" onClick={onClose}>
      <div className="tryon-card" onClick={e => e.stopPropagation()}>
        <div style={{ width:'100%', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
          <div><div style={{ fontSize:17, fontWeight:700, letterSpacing:-0.5 }}>AI 입어보기</div><div style={{ fontSize:12, color:'#9f9b93' }}>{brand} · {product}</div></div>
          <button onClick={onClose} style={{ background:'#f0ede8', border:'none', borderRadius:'50%', width:32, height:32, display:'flex', alignItems:'center', justifyContent:'center', cursor:'pointer', color:'#55534e' }}>{Icon.close}</button>
        </div>
        <div style={{ width:'100%', height:200, background:'linear-gradient(160deg,#e8f9ff,#f4f0ff)', borderRadius:16, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', border:'1px solid #dad4c8', position:'relative', overflow:'hidden' }}>
          {loading ? <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:12 }}><div style={{ fontSize:40, animation:'spin 1s linear infinite', display:'inline-block' }}>✨</div><div style={{ fontSize:14, fontWeight:600, color:'#55534e' }}>AI가 합성 중이에요...</div><div style={{ fontSize:12, color:'#9f9b93' }}>잠시만 기다려주세요</div></div> : <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:6 }}><div style={{ fontSize:56 }}>🧒</div><div style={{ fontSize:28, marginTop:-10 }}>👕</div><div style={{ background:'#84e7a5', color:'#02492a', padding:'3px 12px', borderRadius:100, fontSize:11, fontWeight:700 }}>{size}사이즈 착용</div><div style={{ fontSize:11, color:'#55534e', textAlign:'center', lineHeight:1.5 }}>여유있게 맞아요!<br/>앞으로 3~4개월 착용 가능</div></div>}
          <div style={{ position:'absolute', bottom:10, right:12, fontSize:10, color:'rgba(0,0,0,0.2)', fontWeight:700, letterSpacing:0.5 }}>fitfit AI</div>
        </div>
        <div style={{ width:'100%', display:'flex', gap:8 }}><button className="btn-matcha" style={{ flex:1 }}>공유하기</button><button className="btn-ghost" style={{ flex:1 }} onClick={onClose}>닫기</button></div>
        <div style={{ fontSize:11, color:'#b5b0a8', textAlign:'center' }}>AI 합성 이미지는 실제와 다를 수 있어요</div>
      </div>
    </div>
  );
}

function HistoryScreen({ histories, setHistories, profiles }) {
  const [editMode, setEditMode] = React.useState(false);
  const [selected, setSelected] = React.useState(new Set());
  const toggleSelect = (id) => { setSelected(prev => { const next = new Set(prev); next.has(id) ? next.delete(id) : next.add(id); return next; }); };
  const deleteSelected = () => { setHistories(prev => prev.filter(h => !selected.has(h.id))); setSelected(new Set()); if (selected.size >= histories.length) setEditMode(false); };
  const formatDate = (d) => { const date = new Date(d); return `${date.getMonth()+1}월 ${date.getDate()}일`; };
  return (
    <div className="screen-scroll" style={{ background:'#fffbe8', paddingBottom:90 }}>
      <div className="status-cover"/>
      <div style={{ position:'relative', padding:'72px 16px 12px', overflow:'hidden' }}>
        <div style={{ position:'absolute', top:64, right:28, width:7, height:7, borderRadius:'50%', background:'#3bd3fd', animation:'floatB 2.8s ease-in-out infinite', opacity:0.8 }}/>
        <div style={{ position:'absolute', top:100, right:18, width:18, height:18, borderRadius:'50%', background:'#84e7a5', animation:'floatC 3.6s ease-in-out infinite', opacity:0.75 }}/>
        <div style={{ position:'absolute', top:80, right:60, width:5, height:5, borderRadius:'50%', background:'#fc7981', animation:'floatA 2.5s ease-in-out infinite', opacity:0.8 }}/>
        <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:2, position:'relative', zIndex:1 }}>
          <span style={{ fontSize:26, fontWeight:900, letterSpacing:-0.5, color:'#fc7981', fontFamily:"'Nunito','Pretendard',sans-serif" }}>fitfit</span>
          <span style={{ background:'#fc7981', color:'#fff', fontSize:10, fontWeight:700, padding:'2px 8px', borderRadius:100, letterSpacing:0.5, textTransform:'uppercase' }}>BETA</span>
        </div>
        <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', position:'relative', zIndex:1 }}>
          <div><div style={{ fontSize:20, fontWeight:700, letterSpacing:-0.6, color:'#000', fontFeatureSettings:'"ss01","ss03"' }}>히스토리</div><div style={{ fontSize:12, color:'#9f9b93' }}>추천받은 상품 {histories.length}개</div></div>
          <div style={{ display:'flex', gap:8 }}>
            {editMode && selected.size>0 && <button onClick={deleteSelected} style={{ background:'#fff0f1', border:'1.5px solid #fc7981', borderRadius:10, padding:'7px 12px', color:'#c0434a', fontSize:12, fontWeight:600, cursor:'pointer', fontFamily:'inherit', display:'flex', alignItems:'center', gap:4 }}>{Icon.trash} {selected.size}개 삭제</button>}
            <button className="btn-ghost" onClick={() => { setEditMode(!editMode); setSelected(new Set()); }}>{editMode ? '완료' : '편집'}</button>
          </div>
        </div>
      </div>
      <div style={{ position:'absolute', bottom:100, right:24, width:16, height:16, borderRadius:'50%', background:'#a78bfa', animation:'floatA 3.4s ease-in-out infinite', opacity:0.85, zIndex:5, pointerEvents:'none' }}/>
      <div style={{ position:'absolute', bottom:130, right:50, width:10, height:10, borderRadius:'50%', background:'#f8cc65', animation:'floatB 4.2s ease-in-out infinite', opacity:0.9, zIndex:5, pointerEvents:'none' }}/>
      {histories.length===0 ? (
        <div style={{ padding:'60px 16px', display:'flex', flexDirection:'column', alignItems:'center', gap:12 }}>
          <div style={{ fontSize:48 }}>📭</div>
          <div style={{ fontSize:15, fontWeight:600, color:'#55534e' }}>아직 추천받은 상품이 없어요</div>
          <div style={{ fontSize:13, color:'#9f9b93', textAlign:'center', lineHeight:1.5 }}>사이즈 추천 화면에서<br/>AI 추천을 받아보세요!</div>
        </div>
      ) : (
        <div style={{ padding:'14px 16px 0', display:'flex', flexDirection:'column', gap:10 }}>
          {histories.map((item, idx) => (
            <div key={item.id} style={{ position:'relative' }}>
              {(idx===0 || item.date!==histories[idx-1].date) && <div style={{ fontSize:11, color:'#9f9b93', fontWeight:600, marginBottom:6, paddingLeft:editMode?36:0 }}>{formatDate(item.date)}</div>}
              <div style={{ display:'flex', alignItems:'center', gap:8 }}>
                {editMode && <button onClick={() => toggleSelect(item.id)} style={{ width:24, height:24, borderRadius:'50%', flexShrink:0, border:`2px solid ${selected.has(item.id)?'#fc7981':'#dad4c8'}`, background:selected.has(item.id)?'#fc7981':'#fff', cursor:'pointer', display:'flex', alignItems:'center', justifyContent:'center', color:'#fff', transition:'all 0.15s' }}>{selected.has(item.id) && <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>}</button>}
                <div className="history-item" style={{ flex:1, borderColor:'rgb(186,186,186)' }}>
                  <div className="history-brand-badge" style={{ background:item.color, overflow:'hidden', padding:0 }}>
                    {item.image ? <img src={item.image} alt={item.product} style={{ width:'100%', height:'100%', objectFit:'cover' }} onError={e => { e.target.style.display='none'; }}/> : <span style={{ color:'#000', fontSize:10, fontWeight:800 }}>{item.brandShort}</span>}
                  </div>
                  <div style={{ flex:1 }}>
                    <div style={{ fontSize:11, color:'#9f9b93', fontWeight:600, textTransform:'uppercase', fontFamily:'Pretendard' }}>{item.brand}</div>
                    <div style={{ fontSize:13, fontWeight:600, color:'#000', lineHeight:1.3, marginTop:2 }}>{item.product}</div>
                    <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:4, flexWrap:'wrap' }}>
                      <span className="chip chip-matcha" style={{ fontSize:10, fontFamily:'Pretendard' }}>사이즈 {item.size}</span>
                      {(() => { const prof = profiles.find(p => p.name===item.profile); const charBg = prof && CHAR_ICONS[prof.emoji] ? CHAR_ICONS[prof.emoji].bg : '#f0f0f0'; return <span style={{ fontSize:10, fontWeight:600, color:'#000', background:charBg, padding:'3px 8px', borderRadius:100 }}>{item.profile}</span>; })()}
                    </div>
                  </div>
                  <a href={item.url} style={{ textDecoration:'none' }}><button className="btn-salmon" style={{ padding:'7px 12px', fontSize:12, display:'flex', alignItems:'center', gap:4 }}>{Icon.buy} 구매</button></a>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function TabBar({ activeTab, onTab }) {
  const tabs = [
    { id:'profile', label:'프로필', icon: active => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={active?'#000':'#9f9b93'} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="9" cy="11.5" r="1" fill={active?'#000':'#9f9b93'} stroke="none"/><circle cx="15" cy="11.5" r="1" fill={active?'#000':'#9f9b93'} stroke="none"/><path d="M9 15c.8 1.2 5.2 1.2 6 0"/></svg> },
    { id:'recommend', label:'사이즈 추천', icon: active => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={active?'#000':'#9f9b93'} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M20.38 3.46L16 2a4 4 0 01-8 0L3.62 3.46a2 2 0 00-1.34 2.23l.58 3.57a1 1 0 00.99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 002-2V10h2.15a1 1 0 00.99-.84l.58-3.57a2 2 0 00-1.34-2.23z"/></svg> },
    { id:'history', label:'히스토리', icon: active => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke={active?'#000':'#9f9b93'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> },
  ];
  return (
    <div className="bottom-nav">
      {tabs.map(t => (
        <div key={t.id} className="nav-item" onClick={() => onTab(t.id)}>
          {t.icon(activeTab===t.id)}
          <span className="nav-label" style={{ color:activeTab===t.id?'#000':'#9f9b93', fontWeight:activeTab===t.id?700:500 }}>{t.label}</span>
          {activeTab===t.id && <div style={{ width:4, height:4, borderRadius:'50%', background:'#84e7a5', marginTop:-2 }}/>}
        </div>
      ))}
    </div>
  );
}

// ── 핵심 수정: 단일 폰 프레임 + 탭 전환 ──
function App() {
  const [activeTab,       setActiveTab]       = React.useState('profile');
  const [profiles,        setProfiles]        = React.useState(SAMPLE_PROFILES);
  const [selectedProfile, setSelectedProfile] = React.useState(SAMPLE_PROFILES[0]);
  const [histories,       setHistories]       = React.useState(SAMPLE_HISTORY);
  const isMobile = window.innerWidth <= 480;

  const content = (
    <div style={{ position:'relative', height:'100%' }}>
      {activeTab==='profile' && (
        <ProfileScreen
          profiles={profiles} setProfiles={setProfiles}
          selectedProfile={selectedProfile} setSelectedProfile={setSelectedProfile}
          onRecommend={() => setActiveTab('recommend')}
        />
      )}
      {activeTab==='recommend' && (
        <RecommendScreen
          selectedProfile={selectedProfile}
          histories={histories} setHistories={setHistories}
        />
      )}
      {activeTab==='history' && (
        <HistoryScreen
          histories={histories} setHistories={setHistories}
          profiles={profiles}
        />
      )}
      <TabBar activeTab={activeTab} onTab={setActiveTab}/>
    </div>
  );

  if (isMobile) {
    return (
      <div style={{ width:'100%', height:'100dvh', background:'#fffbe8', position:'relative', overflow:'hidden' }}>
        {content}
      </div>
    );
  }

  return (
    <IOSDevice width={375} height={812}>
      {content}
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
